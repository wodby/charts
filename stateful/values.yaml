# Default values for stateful.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
revisionHistoryLimit: 10
podManagementPolicy: OrderedReady

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

image:
  registry: docker.io
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"
  digest: ""
  pullSecrets: []

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
containerName: ""

commonLabels: {}
commonAnnotations: {}

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

containerPorts:
  - name: http
    containerPort: 80
    protocol: TCP

service:
  enabled: true
  type: ClusterIP
  annotations: {}
  clusterIP: ""
  loadBalancerIP: ""
  externalTrafficPolicy: ""
  ports: []

headlessService:
  enabled: true
  name: ""
  annotations: {}
  publishNotReadyAddresses: true
  ports: []

persistence:
  enabled: false
  existingClaim: ""
  mountPath: /data
  subPath: ""
  storageClass: ""
  labels: {}
  annotations: {}
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  selector: {}

resources: {}

envVars: []
envFrom: []
command: []
args: []

startupProbe: {}
livenessProbe: {}
readinessProbe: {}
lifecycle: {}

updateStrategy:
  type: RollingUpdate

initContainers: []
extraContainers: []

extraVolumes: []
extraVolumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

terminationGracePeriodSeconds: 30
