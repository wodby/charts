apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 18789
      targetPort: openclaw
      protocol: TCP
      name: openclaw
  selector:
    {{- include "openclaw.selectorLabels" . | nindent 4 }}
