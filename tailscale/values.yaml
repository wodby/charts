# Default values for tailscale.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

global:
  imageRegistry: ""

image:
  registry: docker.io
  repository: tailscale/tailscale
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"
  digest: ""
  pullSecrets: [ ]

commonLabels: { }
commonAnnotations: { }

podAffinityPreset: ""
##
podAntiAffinityPreset: soft
##
nodeAffinityPreset:
  ##
  type: ""
  ##
  key: ""
  ##
  values: [ ]
##
affinity: { }

persistence:
  ##
  enabled: true
  ##
  existingClaim: ""
  ##
  storageClass: ""
  ##
  labels: { }
  ##
  annotations: { }
  ##
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  selector: { }

imagePullSecrets: [ ]
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: { }
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

rbac:
  # Specifies whether a Role and RoleBinding should be created
  create: true
  # Allow creating/getting/patching Events for this Pod (helps debugging)
  events: true

podAnnotations: { }
podLabels: { }

podSecurityContext:
  fsGroup: 1000

# Tailscale auth key used for device registration
# authKey: ''
authKey: ''

tsHostname: ''

tsExtraArgs: ''

serve:
  host: ""
  namespace: ""
  port: ""
  protocol: ""

existingSecret: ''

securityContext: { }

resources: { }

envVars: [ ]

nodeSelector: { }

tolerations: [ ]

terminationGracePeriodSeconds: 30
