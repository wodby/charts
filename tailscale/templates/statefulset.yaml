apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tailscale.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tailscale.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tailscale.selectorLabels" . | nindent 6 }}
  serviceName: {{ include "tailscale.fullname" . }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "tailscale.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "tailscale.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "tailscale.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: tailscale
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "tailscale.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: {{ template "tailscale.secretName" . }}
                  key: TS_AUTHKEY
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_AUTH_ONCE
              value: {{ .Values.tsAuthOnce | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            {{- if and .Values.serve.host .Values.serve.namespace .Values.serve.port (or (eq .Values.serve.protocol "http") (eq .Values.serve.protocol "tcp")) }}
            - name: TS_SERVE_CONFIG
              value: /etc/tailscale/serve.json
            {{- end }}
            {{- with .Values.tsHostname }}
            - name: TS_HOSTNAME
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.tsExtraArgs }}
            - name: TS_EXTRA_ARGS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.envVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: ts-state
              mountPath: /var/lib/tailscale
            {{- if and .Values.serve.host .Values.serve.namespace .Values.serve.port (or (eq .Values.serve.protocol "http") (eq .Values.serve.protocol "tcp")) }}
            - name: ts-serve
              mountPath: /etc/tailscale
              readOnly: true
            {{- end }}
            {{- if .Values.extraVolumeMounts }}
            {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumeMounts "context" $) | nindent 12 }}
            {{- end }}
      {{- if or (and .Values.persistence.enabled .Values.persistence.existingClaim) (not .Values.persistence.enabled) (and .Values.serve.host .Values.serve.namespace .Values.serve.port (or (eq .Values.serve.protocol "http") (eq .Values.serve.protocol "tcp"))) .Values.extraVolumes }}
      volumes:
  {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
        - name: ts-state
          persistentVolumeClaim:
            claimName: {{ tpl .Values.persistence.existingClaim . }}
  {{- else if not .Values.persistence.enabled }}
        - name: ts-state
          emptyDir: {}
  {{- end }}
  {{- if and .Values.serve.host .Values.serve.namespace .Values.serve.port (or (eq .Values.serve.protocol "http") (eq .Values.serve.protocol "tcp")) }}
        - name: ts-serve
          configMap:
            name: {{ include "tailscale.serveConfigMapName" . }}
            items:
              - key: serve.json
                path: serve.json
  {{- end }}
        {{- if .Values.extraVolumes }}
        {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumes "context" $) | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: ts-state
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        labels:
          {{- include "tailscale.labels" . | nindent 10 }}
          {{- with .Values.persistence.labels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      spec:
        accessModes:
          {{- range .Values.persistence.accessModes }}
          - {{ . | quote }}
          {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
        {{ include "common.storage.class" (dict "persistence" .Values.persistence "global" .Values.global) }}
        {{- if .Values.persistence.selector }}
        selector: {{- include "common.tplvalues.render" (dict "value" .Values.persistence.selector "context" $) | nindent 10 }}
        {{- end }}
  {{- end }}
